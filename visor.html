<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Visor PDF Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://mozilla.github.io/pdf.js/build/pdf.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Header -->
    <div class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
        <h1 class="font-bold text-gray-800">Mi Documento</h1>

        <div class="flex gap-2">
            <button onclick="prevPage()" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">←</button>
            <button onclick="nextPage()" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">→</button>
        </div>
    </div>

    <!-- Contenedor -->
    <div class="flex-1 flex justify-center items-center p-6">
        <div class="bg-white rounded-2xl shadow-xl p-4">
            <canvas id="pdf-render" class="rounded-lg"></canvas>
        </div>
    </div>

    <script>
        const url = './src/pdf/descripcion.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://mozilla.github.io/pdf.js/build/pdf.worker.js';
        let pdfDoc = null,
            pageNum = 1,
            canvas = document.getElementById('pdf-render'),
            ctx = canvas.getContext('2d');

        pdfjsLib.getDocument(url).promise.then(pdf => {
            pdfDoc = pdf;
            renderPage(pageNum);
        });

        function renderPage(num) {
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                page.render({
                    canvasContext: ctx,
                    viewport: viewport
                });
            });
        }

        function nextPage() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            renderPage(pageNum);
        }

        function prevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            renderPage(pageNum);
        }
    </script>

</body>

</html>
